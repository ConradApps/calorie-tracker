name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Copy web assets into www/
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          [ -f sw.js ]        && cp sw.js www/sw.js               || echo "sw.js not found, skipping"
          [ -f icon-192.png ] && cp icon-192.png www/icon-192.png || echo "icon-192.png not found, skipping"
          [ -f icon-512.png ] && cp icon-512.png www/icon-512.png || echo "icon-512.png not found, skipping"

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk CalorieTracker-debug.apk

      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: CalorieTracker-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
